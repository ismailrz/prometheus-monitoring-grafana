apiVersion: 1

datasources:
  - name:      Loki
    type:      loki
    uid:       loki
    access:    proxy
    url:       http://loki:3100
    isDefault: false
    editable:  false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link trace IDs in logs to a future Tempo datasource
        - name:          TraceID
          matcherRegex:  'trace_id=(\w+)'
          url:           '$${__value.raw}'
