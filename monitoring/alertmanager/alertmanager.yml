route:
  group_by:           ['alertname', 'job']
  group_wait:         30s
  group_interval:     5m
  repeat_interval:    4h
  receiver:           'default-receiver'

  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'default-receiver'
      repeat_interval: 4h

receivers:
  - name: 'default-receiver'
    # No real notification target — just logs in AlertManager UI
    # For production: add Slack/PagerDuty/email config here

  - name: 'critical-receiver'
    # Example Slack config (disabled — set SLACK_WEBHOOK_URL to enable):
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#alerts-critical'
    #     title:   '{{ .GroupLabels.alertname }}'
    #     text:    '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  # If the backend is down, suppress latency/error-rate alerts — they're downstream
  - source_match:
      alertname: 'BackendDown'
    target_match_re:
      alertname: '(HighErrorRate|HighP95Latency|NoIncomingTraffic)'
    equal: ['job']

  # If postgres is down, suppress connection alerts
  - source_match:
      alertname: 'PostgresDown'
    target_match:
      alertname: 'PostgresHighConnections'
