# Host nginx reverse proxy — runs on the EC2 host (not inside Docker).
# Exposes the entire stack on port 80 under clean URL paths.
# Monitoring UIs are protected by HTTP Basic Auth.
#
# For HTTPS: replace the server block with an SSL-terminating block
# and use certbot: sudo certbot --nginx -d your-domain.com

# Upstream definitions — Docker containers are on the default bridge
upstream frontend   { server 127.0.0.1:3000; keepalive 16; }
upstream backend    { server 127.0.0.1:8080; keepalive 16; }
upstream grafana    { server 127.0.0.1:3001; keepalive 8; }
upstream prometheus { server 127.0.0.1:9090; keepalive 8; }
upstream alertmgr   { server 127.0.0.1:9093; keepalive 4; }
upstream loki       { server 127.0.0.1:3100; keepalive 4; }

server {
    listen 80;
    server_name _;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── React SPA ─────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API ───────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ~ ^/(health|ready|metrics)$ {
        proxy_pass http://backend;
        access_log off;
    }

    # ── Grafana ───────────────────────────────────
    # Grafana is set to GF_SERVER_SERVE_FROM_SUB_PATH=true in prod compose
    location /grafana/ {
        auth_basic           "Monitoring — Authorised Access Only";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://grafana;
        proxy_http_version 1.1;
        proxy_set_header   Connection   "";
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;

        # Grafana WebSocket (live dashboards)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Prometheus ────────────────────────────────
    # Strip /prometheus prefix before forwarding
    location /prometheus/ {
        auth_basic           "Monitoring — Authorised Access Only";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://prometheus/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;

        # Prometheus needs absolute redirects fixed
        proxy_redirect     http://prometheus/ /prometheus/;

        sub_filter_once off;
        sub_filter 'href="/'  'href="/prometheus/';
        sub_filter 'src="/'   'src="/prometheus/';
    }

    # ── AlertManager ──────────────────────────────
    location /alertmanager/ {
        auth_basic           "Monitoring — Authorised Access Only";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://alertmgr/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
    }

    # ── Loki (API only — not a UI) ────────────────
    location /loki/ {
        auth_basic           "Monitoring — Authorised Access Only";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://loki/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
    }
}
