# Production Docker Compose overrides.
# Usage: docker compose -f docker-compose.yml -f deploy/aws/docker-compose.prod.yml up -d
#
# What this file does:
#   - Removes host port bindings for internal monitoring services
#     (they are exposed only through the nginx reverse proxy on port 80)
#   - Adds memory/CPU limits so no single container can starve the host
#   - Configures the backend to use an RDS endpoint when use_rds=true
#   - Enables Prometheus remote-write to a future Thanos/Mimir if needed

services:

  # ── Frontend ──────────────────────────────────
  # Port 80 is handled by the host nginx reverse proxy.
  # Container listens on 80 internally; not bound to host port.
  frontend:
    ports: !reset []   # clear the 3000:80 binding from base file
    restart: always
    deploy:
      resources:
        limits:   { memory: 256m, cpus: "0.5" }
        reservations: { memory: 64m }

  # ── Backend ───────────────────────────────────
  backend:
    ports: !reset []   # remove 8080:8080 — only reachable via nginx proxy
    environment:
      - DATABASE_URL=${DATABASE_URL}   # set in .env (RDS or container)
      - ENV=production
      - VERSION=${APP_VERSION:-1.0.0}
    restart: always
    deploy:
      resources:
        limits:   { memory: 512m, cpus: "1.0" }
        reservations: { memory: 128m }

  # ── Database ─────────────────────────────────
  # Comment this entire block out (or scale=0) when use_rds=true.
  db:
    restart: always
    deploy:
      resources:
        limits:   { memory: 512m, cpus: "0.5" }
        reservations: { memory: 256m }

  # ── Prometheus ───────────────────────────────
  prometheus:
    ports: !reset []   # not directly exposed; nginx proxies /prometheus
    restart: always
    deploy:
      resources:
        limits:   { memory: 1g, cpus: "1.0" }
        reservations: { memory: 256m }

  # ── Grafana ──────────────────────────────────
  grafana:
    ports: !reset []   # nginx proxies /grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=http://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    restart: always
    deploy:
      resources:
        limits:   { memory: 512m, cpus: "0.5" }
        reservations: { memory: 128m }

  # ── AlertManager ─────────────────────────────
  alertmanager:
    ports: !reset []
    restart: always
    deploy:
      resources:
        limits:   { memory: 128m, cpus: "0.25" }

  # ── Loki ─────────────────────────────────────
  loki:
    ports: !reset []
    restart: always
    deploy:
      resources:
        limits:   { memory: 512m, cpus: "0.5" }
        reservations: { memory: 128m }

  # ── Promtail ─────────────────────────────────
  promtail:
    ports: !reset []
    restart: always
    deploy:
      resources:
        limits:   { memory: 128m, cpus: "0.25" }

  # ── Exporters ────────────────────────────────
  node-exporter:
    ports: !reset []
    restart: always

  postgres-exporter:
    ports: !reset []
    restart: always

  cadvisor:
    ports: !reset []
    restart: always

  nginx-exporter:
    ports: !reset []
    restart: always
